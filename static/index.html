<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知乎观点擂台 — AI Agent 辩论竞技场</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1a1a24;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #8888a0;
            --yes-color: #4ecdc4;
            --yes-bg: rgba(78, 205, 196, 0.1);
            --no-color: #ff6b6b;
            --no-bg: rgba(255, 107, 107, 0.1);
            --gold: #ffd700;
            --accent: #7c5cfc;
            --accent-dim: rgba(124, 92, 252, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Header ── */
        .header {
            text-align: center;
            padding: 30px 20px 20px;
            background: linear-gradient(180deg, rgba(124,92,252,0.08) 0%, transparent 100%);
            border-bottom: 1px solid var(--border);
        }
        .header h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--yes-color), var(--accent), var(--no-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 6px;
        }
        .header .subtitle {
            color: var(--text-dim);
            font-size: 14px;
        }

        /* ── Topic Selection ── */
        .topic-selection {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .topic-selection h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: var(--text-dim);
        }
        .topic-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .topic-card:hover {
            border-color: var(--accent);
            background: var(--surface-2);
            transform: translateY(-1px);
        }
        .topic-card.selected {
            border-color: var(--accent);
            background: var(--accent-dim);
        }
        .topic-card .category {
            font-size: 12px;
            color: var(--accent);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .topic-card .title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .topic-card .context {
            font-size: 13px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .topic-card .hot {
            display: inline-block;
            background: rgba(255, 107, 107, 0.15);
            color: var(--no-color);
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 8px;
        }

        .start-btn {
            display: block;
            width: 100%;
            max-width: 800px;
            margin: 20px auto;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent), #5a3fd4);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .start-btn:hover { transform: translateY(-1px); opacity: 0.9; }
        .start-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none;
        }

        /* ── Arena ── */
        .arena { display: none; max-width: 1000px; margin: 0 auto; padding: 20px; }
        .arena.active { display: block; }

        .arena-topic {
            text-align: center;
            padding: 20px;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }
        .arena-topic .debate-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .arena-topic .phase-indicator {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            background: var(--accent-dim);
            color: var(--accent);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        /* ── Teams ── */
        .teams {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        .team {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .team.yes { border-left: 3px solid var(--yes-color); }
        .team.no { border-left: 3px solid var(--no-color); }
        .team h3 {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .team.yes h3 { color: var(--yes-color); }
        .team.no h3 { color: var(--no-color); }
        .team-vs {
            display: flex;
            align-items: center;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dim);
        }
        .agent-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--surface-2);
            border-radius: 8px;
            margin: 4px;
            font-size: 13px;
            transition: all 0.3s;
        }
        .agent-chip.yes { border: 1px solid rgba(78, 205, 196, 0.3); }
        .agent-chip.no { border: 1px solid rgba(255, 107, 107, 0.3); }
        .agent-chip .confidence {
            font-size: 11px;
            color: var(--text-dim);
        }

        /* ── Score Board ── */
        .score-board {
            display: none;
            grid-template-columns: 1fr auto 1fr;
            gap: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        .score-board.visible { display: grid; }
        .score-side {
            background: var(--surface);
            border-radius: 12px;
            padding: 16px;
            border: 1px solid var(--border);
        }
        .score-side .score-num {
            font-size: 36px;
            font-weight: 800;
        }
        .score-side.yes .score-num { color: var(--yes-color); }
        .score-side.no .score-num { color: var(--no-color); }
        .score-side .score-label {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        .score-vs {
            display: flex;
            align-items: center;
            font-size: 16px;
            color: var(--text-dim);
        }

        /* ── Debate Feed ── */
        .debate-feed {
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            min-height: 300px;
            max-height: 600px;
            overflow-y: auto;
        }
        .debate-feed::-webkit-scrollbar { width: 4px; }
        .debate-feed::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }
        .feed-empty {
            text-align: center;
            color: var(--text-dim);
            padding: 60px 20px;
            font-size: 14px;
        }

        .phase-divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }
        .phase-divider::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: 50%;
            height: 1px;
            background: var(--border);
        }
        .phase-divider span {
            position: relative;
            background: var(--surface);
            padding: 4px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .debate-msg {
            display: flex;
            gap: 12px;
            margin: 12px 0;
            padding: 12px;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
        }
        .debate-msg.yes-msg { background: var(--yes-bg); }
        .debate-msg.no-msg { background: var(--no-bg); }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            font-size: 28px;
            flex-shrink: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .msg-body { flex: 1; }
        .msg-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .msg-name {
            font-weight: 600;
            font-size: 14px;
        }
        .msg-badge {
            font-size: 11px;
            padding: 1px 8px;
            border-radius: 10px;
            font-weight: 500;
        }
        .msg-badge.yes {
            background: rgba(78, 205, 196, 0.2);
            color: var(--yes-color);
        }
        .msg-badge.no {
            background: rgba(255, 107, 107, 0.2);
            color: var(--no-color);
        }
        .msg-target {
            font-size: 11px;
            color: var(--text-dim);
        }
        .msg-content {
            font-size: 14px;
            line-height: 1.6;
        }
        .msg-tactics {
            display: flex;
            gap: 6px;
            margin-top: 6px;
            flex-wrap: wrap;
        }
        .msg-tactics span {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            background: var(--surface-2);
            color: var(--text-dim);
        }

        /* ── Position Change ── */
        .position-change {
            text-align: center;
            margin: 16px 0;
            padding: 14px;
            background: linear-gradient(135deg, var(--no-bg), var(--yes-bg));
            border-radius: 10px;
            border: 1px dashed var(--accent);
            animation: slideIn 0.3s ease-out;
        }
        .position-change .change-icon { font-size: 20px; }
        .position-change .change-text {
            font-size: 14px;
            font-weight: 600;
            margin: 4px 0;
        }
        .position-change .change-reason {
            font-size: 12px;
            color: var(--text-dim);
        }

        /* ── Result Panel ── */
        .result-panel {
            display: none;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 24px;
            margin-top: 20px;
            animation: slideIn 0.5s ease-out;
        }
        .result-panel.visible { display: block; }
        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .result-header .trophy { font-size: 48px; }
        .result-header h2 {
            font-size: 22px;
            margin: 8px 0;
        }
        .result-header .winner-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 700;
        }
        .winner-badge.yes {
            background: var(--yes-bg);
            color: var(--yes-color);
            border: 1px solid var(--yes-color);
        }
        .winner-badge.no {
            background: var(--no-bg);
            color: var(--no-color);
            border: 1px solid var(--no-color);
        }

        .judge-reasoning {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 16px;
            margin: 16px 0;
            font-size: 14px;
            line-height: 1.6;
            border-left: 3px solid var(--gold);
        }
        .judge-reasoning .label {
            font-size: 12px;
            color: var(--gold);
            font-weight: 600;
            margin-bottom: 6px;
        }

        .payouts {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 16px;
        }
        .payout-card {
            background: var(--surface-2);
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }
        .payout-card .payout-emoji { font-size: 24px; }
        .payout-card .payout-name { font-size: 13px; margin: 4px 0; }
        .payout-card .payout-amount {
            font-size: 18px;
            font-weight: 700;
        }
        .payout-card .payout-amount.positive { color: var(--yes-color); }
        .payout-card .payout-amount.negative { color: var(--no-color); }

        /* ── Leaderboard ── */
        .leaderboard-section {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }
        .leaderboard-section h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: var(--text-dim);
        }
        .leaderboard-table {
            width: 100%;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }
        .leaderboard-table th, .leaderboard-table td {
            padding: 12px 16px;
            text-align: left;
            font-size: 14px;
        }
        .leaderboard-table th {
            background: var(--surface-2);
            color: var(--text-dim);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .leaderboard-table tr { border-bottom: 1px solid var(--border); }
        .leaderboard-table tr:last-child { border-bottom: none; }
        .lb-rank { font-weight: 700; color: var(--gold); width: 40px; }

        /* ── New Debate Button ── */
        .new-debate-btn {
            display: none;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            padding: 12px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, var(--accent), #5a3fd4);
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .new-debate-btn.visible { display: block; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .teams { grid-template-columns: 1fr; }
            .team-vs { justify-content: center; font-size: 16px; }
            .score-board { grid-template-columns: 1fr; }
            .score-vs { display: none; }
            .header h1 { font-size: 22px; }
            .payouts { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>知乎观点擂台</h1>
    <div class="subtitle">AI Agent 辩论竞技场 — 5 个性格迥异的 Agent 为热点话题激烈交锋</div>
</div>

<!-- Topic Selection -->
<div id="topic-selection" class="topic-selection">
    <h2>选择辩题 — 来自知乎热榜</h2>
    <div id="topics-list"></div>
    <button id="start-btn" class="start-btn" disabled onclick="startDebate()">
        选择一个话题开始辩论
    </button>
</div>

<!-- Arena -->
<div id="arena" class="arena">
    <div class="arena-topic">
        <div id="debate-title" class="debate-title"></div>
        <div id="phase-indicator" class="phase-indicator">准备中...</div>
    </div>

    <!-- Teams -->
    <div class="teams">
        <div class="team yes">
            <h3>支持方 (YES)</h3>
            <div id="yes-team"></div>
        </div>
        <div class="team-vs">VS</div>
        <div class="team no">
            <h3>反对方 (NO)</h3>
            <div id="no-team"></div>
        </div>
    </div>

    <!-- Score Board (shown during resolution) -->
    <div id="score-board" class="score-board">
        <div class="score-side yes">
            <div id="yes-score" class="score-num">-</div>
            <div class="score-label">YES 方得分</div>
        </div>
        <div class="score-vs">:</div>
        <div class="score-side no">
            <div id="no-score" class="score-num">-</div>
            <div class="score-label">NO 方得分</div>
        </div>
    </div>

    <!-- Debate Feed -->
    <div id="debate-feed" class="debate-feed">
        <div class="feed-empty">
            等待辩论开始...<br>
            Agent 们正在分析话题，选择立场
        </div>
    </div>

    <!-- Result Panel -->
    <div id="result-panel" class="result-panel">
        <div class="result-header">
            <div class="trophy">🏆</div>
            <h2>裁判裁决</h2>
            <div id="winner-badge" class="winner-badge"></div>
        </div>
        <div id="judge-reasoning" class="judge-reasoning">
            <div class="label">裁判点评</div>
            <div id="judge-text"></div>
        </div>
        <div id="payouts" class="payouts"></div>
    </div>

    <button id="new-debate-btn" class="new-debate-btn" onclick="newDebate()">
        开始新一场辩论
    </button>
</div>

<!-- Leaderboard -->
<div class="leaderboard-section">
    <h2>全局排行榜</h2>
    <table class="leaderboard-table">
        <thead>
            <tr>
                <th>#</th>
                <th>Agent</th>
                <th>胜/负</th>
                <th>总积分</th>
                <th>说服次数</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            <tr><td colspan="5" style="text-align:center;color:var(--text-dim)">辩论结束后更新</td></tr>
        </tbody>
    </table>
</div>

<script>
    let selectedTopicIndex = -1;
    let currentDebateId = null;
    let ws = null;
    let feedCleared = false;
    let currentPhaseLabel = '';

    // ── Load Topics ──
    async function loadTopics() {
        const resp = await fetch('/api/topics');
        const data = await resp.json();
        const list = document.getElementById('topics-list');
        list.innerHTML = '';

        data.topics.forEach((topic, i) => {
            const card = document.createElement('div');
            card.className = 'topic-card';
            card.onclick = () => selectTopic(i);
            card.innerHTML = `
                <div class="category">${topic.category}</div>
                <div class="title">${topic.title}</div>
                <div class="context">${topic.context}</div>
                <span class="hot">🔥 热度 ${topic.hot_score}</span>
            `;
            list.appendChild(card);
        });
    }

    function selectTopic(index) {
        selectedTopicIndex = index;
        document.querySelectorAll('.topic-card').forEach((card, i) => {
            card.classList.toggle('selected', i === index);
        });
        const btn = document.getElementById('start-btn');
        btn.disabled = false;
        btn.textContent = '开始辩论！';
    }

    // ── Start Debate ──
    async function startDebate() {
        if (selectedTopicIndex < 0) return;

        const btn = document.getElementById('start-btn');
        btn.disabled = true;
        btn.textContent = '正在召集 Agent...';

        const resp = await fetch('/api/debate/start', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `topic_index=${selectedTopicIndex}`,
        });
        const data = await resp.json();
        currentDebateId = data.debate_id;

        // Switch to arena view
        document.getElementById('topic-selection').style.display = 'none';
        const arena = document.getElementById('arena');
        arena.classList.add('active');
        document.getElementById('debate-title').textContent = data.topic.title;

        // Clear state
        feedCleared = false;
        document.getElementById('yes-team').innerHTML = '';
        document.getElementById('no-team').innerHTML = '';
        document.getElementById('result-panel').classList.remove('visible');
        document.getElementById('score-board').classList.remove('visible');
        document.getElementById('new-debate-btn').classList.remove('visible');
        document.getElementById('debate-feed').innerHTML =
            '<div class="feed-empty">Agent 们正在分析话题，选择立场...</div>';

        // Connect WebSocket
        connectWS(currentDebateId);
    }

    // ── WebSocket ──
    function connectWS(debateId) {
        const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(`${proto}//${location.host}/ws/debate/${debateId}`);

        ws.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            handleEvent(msg);
        };

        ws.onclose = () => {
            console.log('WS closed');
        };
    }

    function handleEvent(event) {
        switch (event.type) {
            case 'phase_change':
                updatePhase(event.data);
                break;
            case 'bet':
                addBet(event.data);
                break;
            case 'message':
                addMessage(event.data);
                break;
            case 'position_change':
                addPositionChange(event.data);
                break;
            case 'result':
                showResult(event.data);
                break;
        }
    }

    function updatePhase(data) {
        const indicator = document.getElementById('phase-indicator');
        currentPhaseLabel = data.label || data.phase;
        indicator.textContent = currentPhaseLabel;

        if (data.phase === 'resolution') {
            indicator.style.background = 'rgba(255, 215, 0, 0.15)';
            indicator.style.color = 'var(--gold)';
        }
    }

    function addBet(data) {
        if (!feedCleared) {
            document.getElementById('debate-feed').innerHTML = '';
            feedCleared = true;
        }

        const teamId = data.position === 'YES' ? 'yes-team' : 'no-team';
        const side = data.position === 'YES' ? 'yes' : 'no';
        const team = document.getElementById(teamId);

        const chip = document.createElement('div');
        chip.className = `agent-chip ${side}`;
        chip.id = `chip-${data.agent_name}`;
        chip.innerHTML = `
            <span>${data.agent_emoji}</span>
            <span>${data.agent_name}</span>
            <span class="confidence">${Math.round(data.confidence * 100)}%</span>
        `;
        team.appendChild(chip);

        // Add to feed
        const feed = document.getElementById('debate-feed');
        const msg = document.createElement('div');
        const sideLabel = data.position === 'YES' ? '支持' : '反对';
        msg.className = `debate-msg ${side}-msg`;
        msg.innerHTML = `
            <div class="msg-avatar">${data.agent_emoji}</div>
            <div class="msg-body">
                <div class="msg-header">
                    <span class="msg-name">${data.agent_name}</span>
                    <span class="msg-badge ${side}">${sideLabel} · ${data.stake}分</span>
                </div>
                <div class="msg-content">${data.reasoning}</div>
            </div>
        `;
        feed.appendChild(msg);
        feed.scrollTop = feed.scrollHeight;
    }

    function addMessage(data) {
        const feed = document.getElementById('debate-feed');

        // Add phase divider if new phase
        const phaseLabels = {
            'opening': '第一轮：开场陈述',
            'rebuttal': '第二轮：反驳交锋',
            'free_debate': '第三轮：自由辩论'
        };
        if (phaseLabels[data.phase]) {
            const existingDividers = feed.querySelectorAll('.phase-divider');
            const label = phaseLabels[data.phase];
            const alreadyExists = Array.from(existingDividers).some(d =>
                d.textContent.trim() === label
            );
            if (!alreadyExists) {
                const divider = document.createElement('div');
                divider.className = 'phase-divider';
                divider.innerHTML = `<span>${label}</span>`;
                feed.appendChild(divider);
            }
        }

        const side = data.position === 'YES' ? 'yes' : 'no';
        const msg = document.createElement('div');
        msg.className = `debate-msg ${side}-msg`;

        let targetHtml = '';
        if (data.target_agent) {
            targetHtml = `<span class="msg-target">回复 @${data.target_agent}</span>`;
        }

        let tacticsHtml = '';
        if (data.tactics && data.tactics.length > 0) {
            tacticsHtml = '<div class="msg-tactics">' +
                data.tactics.map(t => `<span>${t}</span>`).join('') +
                '</div>';
        }

        msg.innerHTML = `
            <div class="msg-avatar">${data.agent_emoji}</div>
            <div class="msg-body">
                <div class="msg-header">
                    <span class="msg-name">${data.agent_name}</span>
                    <span class="msg-badge ${side}">${data.position === 'YES' ? '支持' : '反对'}</span>
                    ${targetHtml}
                </div>
                <div class="msg-content">${data.content}</div>
                ${tacticsHtml}
            </div>
        `;
        feed.appendChild(msg);
        feed.scrollTop = feed.scrollHeight;
    }

    function addPositionChange(data) {
        const feed = document.getElementById('debate-feed');

        // Add divider if first position change
        const existingDividers = feed.querySelectorAll('.phase-divider');
        const label = '立场更新';
        const alreadyExists = Array.from(existingDividers).some(d =>
            d.textContent.trim() === label
        );
        if (!alreadyExists) {
            const divider = document.createElement('div');
            divider.className = 'phase-divider';
            divider.innerHTML = `<span>${label}</span>`;
            feed.appendChild(divider);
        }

        const change = document.createElement('div');
        change.className = 'position-change';
        change.innerHTML = `
            <div class="change-icon">🔄</div>
            <div class="change-text">
                ${data.agent_emoji} ${data.agent_name} 改变了立场！
                ${data.old_position} → ${data.new_position}
            </div>
            <div class="change-reason">
                ${data.reasoning}
                ${data.influenced_by ? `<br>被 ${data.influenced_by} 说服` : ''}
            </div>
        `;
        feed.appendChild(change);
        feed.scrollTop = feed.scrollHeight;

        // Move chip to other team
        const chip = document.getElementById(`chip-${data.agent_name}`);
        if (chip) {
            chip.remove();
            const newTeamId = data.new_position === 'YES' ? 'yes-team' : 'no-team';
            const newSide = data.new_position === 'YES' ? 'yes' : 'no';
            chip.className = `agent-chip ${newSide}`;
            document.getElementById(newTeamId).appendChild(chip);
        }
    }

    function showResult(data) {
        // Update phase
        const indicator = document.getElementById('phase-indicator');
        indicator.textContent = '辩论结束';
        indicator.style.animation = 'none';

        // Show scores if available
        if (data.scores) {
            document.getElementById('score-board').classList.add('visible');
            const yesScore = data.scores.YES ? data.scores.YES.total : '-';
            const noScore = data.scores.NO ? data.scores.NO.total : '-';
            document.getElementById('yes-score').textContent = yesScore;
            document.getElementById('no-score').textContent = noScore;
        }

        // Show result panel
        const panel = document.getElementById('result-panel');
        panel.classList.add('visible');

        const badge = document.getElementById('winner-badge');
        const side = data.winning_position === 'YES' ? 'yes' : 'no';
        badge.className = `winner-badge ${side}`;
        badge.textContent = data.winning_position === 'YES'
            ? '支持方 (YES) 胜出！'
            : '反对方 (NO) 胜出！';

        document.getElementById('judge-text').textContent = data.judge_reasoning;

        // Payouts
        const payoutsDiv = document.getElementById('payouts');
        payoutsDiv.innerHTML = '';
        if (data.payouts) {
            // Sort by amount descending
            const sorted = Object.entries(data.payouts).sort((a, b) => b[1] - a[1]);
            for (const [name, amount] of sorted) {
                // Find emoji from bets or leaderboard
                const card = document.createElement('div');
                card.className = 'payout-card';
                const sign = amount > 0 ? '+' : '';
                const cls = amount > 0 ? 'positive' : 'negative';
                card.innerHTML = `
                    <div class="payout-name">${name}</div>
                    <div class="payout-amount ${cls}">${sign}${amount}</div>
                `;
                payoutsDiv.appendChild(card);
            }
        }

        // Show new debate button
        document.getElementById('new-debate-btn').classList.add('visible');

        // Refresh leaderboard
        loadLeaderboard();

        // Add result divider to feed
        const feed = document.getElementById('debate-feed');
        const divider = document.createElement('div');
        divider.className = 'phase-divider';
        divider.innerHTML = '<span>裁判裁决</span>';
        feed.appendChild(divider);
        feed.scrollTop = feed.scrollHeight;
    }

    function newDebate() {
        document.getElementById('arena').classList.remove('active');
        document.getElementById('topic-selection').style.display = 'block';
        selectedTopicIndex = -1;
        document.querySelectorAll('.topic-card').forEach(c => c.classList.remove('selected'));
        const btn = document.getElementById('start-btn');
        btn.disabled = true;
        btn.textContent = '选择一个话题开始辩论';
        if (ws) ws.close();
    }

    async function loadLeaderboard() {
        try {
            const resp = await fetch('/api/leaderboard');
            const data = await resp.json();
            const tbody = document.getElementById('leaderboard-body');

            if (data.leaderboard.every(a => a.debates === 0)) return;

            tbody.innerHTML = '';
            data.leaderboard.forEach((agent, i) => {
                const tr = document.createElement('tr');
                const scoreColor = agent.total_score > 0 ? 'var(--yes-color)' :
                                   agent.total_score < 0 ? 'var(--no-color)' : 'var(--text-dim)';
                tr.innerHTML = `
                    <td class="lb-rank">${i + 1}</td>
                    <td>${agent.emoji} ${agent.name}</td>
                    <td>${agent.wins}W / ${agent.losses}L</td>
                    <td style="color:${scoreColor};font-weight:700">
                        ${agent.total_score > 0 ? '+' : ''}${agent.total_score}
                    </td>
                    <td>${agent.persuasions_caused}</td>
                `;
                tbody.appendChild(tr);
            });
        } catch (e) {
            console.error('Failed to load leaderboard:', e);
        }
    }

    // ── Init ──
    loadTopics();
    loadLeaderboard();
</script>

</body>
</html>

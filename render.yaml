services:
  - type: web
    name: opinion-exchange-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    disk:
      name: debate-data
      mountPath: /app/data
      sizeGB: 1
    envVars:
      - key: MINIMAX_API_KEY
        sync: false
      - key: ZHIHU_APP_KEY
        sync: false
      - key: ZHIHU_APP_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
